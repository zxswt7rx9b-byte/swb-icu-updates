<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MMUH ICU Team Updates</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f0f4ff;
      min-height: 100vh;
      padding: 0 0 60px;
    }

    /* ── Header ── */
    .header {
      background: linear-gradient(135deg, #1a56db 0%, #0e3fa3 100%);
      color: #fff;
      padding: 40px 32px 36px;
      text-align: center;
    }
    .header-tag {
      display: inline-block;
      background: rgba(255,255,255,0.18);
      border: 1px solid rgba(255,255,255,0.35);
      border-radius: 20px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 4px 14px;
      margin-bottom: 16px;
    }
    .header h1 {
      font-size: clamp(22px, 5vw, 34px);
      font-weight: 800;
      letter-spacing: -0.5px;
      line-height: 1.15;
      margin-bottom: 10px;
    }
    .header p {
      font-size: 15px;
      opacity: 0.85;
      max-width: 480px;
      margin: 0 auto;
      line-height: 1.5;
    }

    /* ── Content ── */
    .container {
      max-width: 680px;
      margin: 0 auto;
      padding: 36px 20px 0;
    }

    .section-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #1a56db;
      margin-bottom: 16px;
    }

    /* ── Issue cards ── */
    .issue-card {
      background: #fff;
      border-radius: 16px;
      border: 1.5px solid #dbe4ff;
      padding: 22px 24px;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 20px;
      text-decoration: none;
      color: inherit;
      transition: box-shadow 0.18s, border-color 0.18s, transform 0.18s;
    }
    .issue-card:hover {
      box-shadow: 0 6px 24px rgba(26,86,219,0.13);
      border-color: #93c5fd;
      transform: translateY(-2px);
    }
    .issue-badge {
      min-width: 52px;
      height: 52px;
      border-radius: 12px;
      background: linear-gradient(135deg, #1a56db14, #0e3fa308);
      border: 1.5px solid #93c5fd;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 800;
      color: #1a56db;
      text-transform: uppercase;
      letter-spacing: 0.03em;
      line-height: 1.2;
    }
    .issue-info { flex: 1; }
    .issue-title {
      font-size: 16px;
      font-weight: 700;
      color: #1e293b;
      margin-bottom: 4px;
    }
    .issue-meta {
      font-size: 13px;
      color: #64748b;
    }
    .issue-arrow {
      font-size: 20px;
      color: #93c5fd;
      flex-shrink: 0;
    }

    /* ── Latest badge ── */
    .latest-tag {
      display: inline-block;
      background: #dcfce7;
      color: #166534;
      border-radius: 10px;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: 2px 8px;
      margin-left: 8px;
      vertical-align: middle;
    }

    /* ── Footer ── */
    .footer {
      text-align: center;
      margin-top: 48px;
      font-size: 12px;
      color: #94a3b8;
    }
    .footer a { color: #1a56db; text-decoration: none; }

    @media (max-width: 480px) {
      .header { padding: 28px 20px 24px; }
      .issue-card { padding: 16px 18px; gap: 14px; }
    }
  </style>
</head>
<body>

  <!-- ══ HEADER ══ -->
  <div class="header">
    <div class="header-tag">Critical Care — MMUH</div>
    <h1>ICU Team Updates</h1>
    <p>Monthly newsletters for intensive care staff at Midland Metropolitan University Hospital</p>
  </div>

  <!-- ══ ISSUES ══ -->
  <div class="container">
    <div class="section-label">All Issues</div>

    <a class="issue-card" href="may-2026.html">
      <div class="issue-badge">May<br>2026</div>
      <div class="issue-info">
        <div class="issue-title">May 2026 <span class="latest-tag">Latest</span></div>
        <div class="issue-meta">GenOMICC top 10 &middot; Extubation checklist &middot; Baton phones &middot; Uniform reminder</div>
      </div>
      <div class="issue-arrow">&#8250;</div>
    </a>

    <!-- Future issues will be added above this comment -->

    <div class="footer">
      <p>MMUH ICU Team Updates</p>
    </div>
  </div>

</body>
</html>
